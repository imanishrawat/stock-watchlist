<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio ATH Tracker (Target Planner)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card { background: white; border: 1px solid #e2e8f0; }
        .is-invested { background-color: #1e3a8a !important; color: white !important; font-weight: bold; }
        .is-priority { background-color: #fef9c3 !important; color: #a16207 !important; border-left: 4px solid #eab308 !important; }
        thead th { position: sticky; top: 0; z-index: 30; background-color: #0f172a; cursor: pointer; border-right: 1px solid #334155; }
        thead th:hover { background-color: #1e293b; }
        .sticky-col { position: sticky; left: 0; z-index: 10; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-3 md:p-8 text-slate-900">

    <div class="max-w-full mx-auto">
        <header class="mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-indigo-900 leading-tight">Investment ATH Tracker</h1>
                <p class="text-xs text-slate-500 font-medium">100% Offline Target Planner. Click Stock Name to Highlight. Tap % to mark as Invested.</p>
            </div>
        </header>

        <div class="glass-card rounded-xl p-4 mb-6 shadow-sm border-indigo-200 border-2">
            <input type="hidden" id="editIndex" value="-1">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-3 items-end">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Stock Symbol</label>
                    <input type="text" id="stockSearch" placeholder="RELAXO.NS" class="w-full p-2 border rounded-lg outline-none uppercase font-bold text-indigo-900">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Exact ATH (₹)</label>
                    <input type="number" id="stockHigh" class="w-full p-2 border rounded-lg outline-none" step="any">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Category</label>
                    <select id="manualCap" class="w-full p-2 border rounded-lg bg-white">
                        <option value="Large">Large Cap</option>
                        <option value="Mid">Mid Cap</option>
                        <option value="Small">Small Cap</option>
                        <option value="Index">Index</option>
                        <option value="ETF">ETF</option>
                    </select>
                </div>
                <button onclick="saveStock()" id="saveBtn" class="bg-indigo-600 text-white font-bold py-2 rounded-lg shadow-md active:bg-indigo-800">
                    Save Changes
                </button>
            </div>
        </div>

        <div class="glass-card rounded-xl shadow-lg overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left min-w-[1200px]">
                    <thead class="text-white text-[10px] uppercase">
                        <tr>
                            <th class="p-4 sticky-col bg-slate-900" onclick="sortData('name')">Asset ↕</th>
                            <th class="p-4" onclick="sortData('cap')">Cap/Type ↕</th>
                            <th class="p-4 text-center" onclick="sortData('high')">Exact ATH ↕</th>
                            <th class="p-4 text-center bg-red-900/90">-10%</th>
                            <th class="p-4 text-center bg-red-900/90">-20%</th>
                            <th class="p-4 text-center bg-red-900/90">-30%</th>
                            <th class="p-4 text-center bg-red-900/90">-40%</th>
                            <th class="p-4 text-center bg-red-900/90">-50%</th>
                            <th class="p-4 text-center bg-red-800/90">-60%</th>
                            <th class="p-4 text-center bg-red-800/90">-70%</th>
                            <th class="p-4 text-center bg-red-800/90">-80%</th>
                            <th class="p-4 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="watchlistBody" class="bg-white divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const initialPortfolio = [
            { name: "NIFTY 50", cap: "Index", high: 26277.35 },
            { name: "NIFTY MIDCAP 100", cap: "Index", high: 60976.20 },
            { name: "NIFTY SMALLCAP 100", cap: "Index", high: 19641.50 },
            { name: "GGBL.NS", cap: "Small", high: 635.00 },
            { name: "MUTHOOTFIN.NS", cap: "Large", high: 4149.50 },
            { name: "ZENTEC.NS", cap: "Mid", high: 2268.00 },
            { name: "SENCO.NS", cap: "Small", high: 1544.00 },
            { name: "HDFCAMC.NS", cap: "Large", high: 3844.00 },
            { name: "NETWEB.NS", cap: "Mid", high: 4479.00 },
            { name: "DMART.NS", cap: "Large", high: 5900.00 },
            { name: "JIOFIN.NS", cap: "Large", high: 394.70 },
            { name: "BAJAJFINSV.NS", cap: "Large", high: 1932.50 },
            { name: "HAPPISTMND.NS", cap: "Small", high: 1580.80 },
            { name: "NEOGEN.NS", cap: "Small", high: 1950.00 },
            { name: "BAJFINANCE.NS", cap: "Large", high: 8192.00 },
            { name: "HINDUNILVR.NS", cap: "Large", high: 2859.30 },
            { name: "MAFANG.NS", cap: "ETF", high: 162.00 },
            { name: "METROPOLIS.NS", cap: "Mid", high: 3582.80 },
            { name: "HDFCBANK.NS", cap: "Large", high: 1757.80 },
            { name: "ROUTE.NS", cap: "Small", high: 2389.00 },
            { name: "ALKYLAMINE.NS", cap: "Small", high: 4749.00 },
            { name: "DIXON.NS", cap: "Large", high: 11500.00 },
            { name: "IEX.NS", cap: "Mid", high: 318.40 },
            { name: "RELAXO.NS", cap: "Mid", high: 1448.00 },
            { name: "CAMS.NS", cap: "Mid", high: 4532.00 },
            { name: "RTNINDIA.NS", cap: "Small", high: 84.00 },
            { name: "IRCTC.NS", cap: "Large", high: 1279.30 },
            { name: "AEROFLEX.NS", cap: "Small", high: 255.30 },
            { name: "ASIANPAINT.NS", cap: "Large", high: 3590.00 },
            { name: "LICI.NS", cap: "Large", high: 1175.00 },
            { name: "BRITANNIA.NS", cap: "Large", high: 6468.00 },
            { name: "DEEPAKNTR.NS", cap: "Mid", high: 3020.00 },
            { name: "INFY.NS", cap: "Large", high: 1953.90 },
            { name: "RELIANCE.NS", cap: "Large", high: 3217.90 },
            { name: "LTIM.NS", cap: "Large", high: 7588.80 },
            { name: "CLEAN.NS", cap: "Mid", high: 2705.00 },
            { name: "AARTIIND.NS", cap: "Mid", high: 1168.00 },
            { name: "DIVISLAB.NS", cap: "Large", high: 5425.10 },
            { name: "SBICARD.NS", cap: "Large", high: 1164.00 },
            { name: "ULTRACEMCO.NS", cap: "Large", high: 12100.00 },
            { name: "SUPRIYA.NS", cap: "Small", high: 615.20 },
            { name: "AFFLE.NS", cap: "Small", high: 1640.00 },
            { name: "INDIAMART.NS", cap: "Mid", high: 9950.00 },
            { name: "LATENTVIEW.NS", cap: "Small", high: 750.00 },
            { name: "ROLEXRINGS.NS", cap: "Small", high: 2600.00 },
            { name: "LALPATHLAB.NS", cap: "Mid", high: 4245.00 },
            { name: "HDFCLIFE.NS", cap: "Large", high: 775.65 },
            { name: "NAUKRI.NS", cap: "Large", high: 7465.40 },
            { name: "JUBLFOOD.NS", cap: "Large", high: 950.00 },
            { name: "ASTRAL.NS", cap: "Large", high: 2450.00 },
            { name: "LTTS.NS", cap: "Large", high: 6000.00 },
            { name: "AARTIPHARM.NS", cap: "Small", high: 800.00 },
            { name: "BERGEPAINT.NS", cap: "Large", high: 854.00 },
            { name: "HLEGLAS.NS", cap: "Small", high: 1550.00 }
        ];

        // Force a reset to load the new data structure (without current prices) into local storage
        if(localStorage.getItem('apiTrackerResetV5') !== 'true') {
            localStorage.removeItem('myWatchlist');
            localStorage.setItem('apiTrackerResetV5', 'true');
        }

        let stocks = JSON.parse(localStorage.getItem('myWatchlist')) || initialPortfolio.map(s => {
            return { ...s, invested: [], isPriority: false };
        });

        let sortDir = {};

        function saveStock() {
            const name = document.getElementById('stockSearch').value.toUpperCase().trim();
            const high = parseFloat(document.getElementById('stockHigh').value);
            const cap = document.getElementById('manualCap').value;
            const editIndex = parseInt(document.getElementById('editIndex').value);

            if (!name || isNaN(high)) return alert("Enter Symbol and Exact ATH");

            const stockData = { 
                name, 
                high, 
                cap, 
                invested: (editIndex > -1 ? stocks[editIndex].invested : []),
                isPriority: (editIndex > -1 ? stocks[editIndex].isPriority : false)
            };

            if (editIndex > -1) {
                stocks[editIndex] = stockData;
            } else {
                stocks.push(stockData);
            }
            resetForm();
            updateUI();
        }

        function editStock(index) {
            const s = stocks[index];
            document.getElementById('stockSearch').value = s.name;
            document.getElementById('stockHigh').value = s.high;
            document.getElementById('manualCap').value = s.cap;
            document.getElementById('editIndex').value = index;
            document.getElementById('saveBtn').innerText = "Update Entry";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleInvested(sIdx, lIdx) {
            if(!stocks[sIdx].invested) stocks[sIdx].invested = [];
            const idx = stocks[sIdx].invested.indexOf(lIdx);
            if (idx > -1) stocks[sIdx].invested.splice(idx, 1);
            else stocks[sIdx].invested.push(lIdx);
            updateUI();
        }

        function togglePriority(sIdx) {
            stocks[sIdx].isPriority = !stocks[sIdx].isPriority;
            updateUI();
        }

        function updateUI() {
            localStorage.setItem('myWatchlist', JSON.stringify(stocks));
            const tbody = document.getElementById('watchlistBody');
            tbody.innerHTML = '';
            stocks.forEach((s, i) => {
                let capCol = s.cap === 'Large' ? 'text-blue-600' : 
                             (s.cap === 'Mid' ? 'text-purple-600' : 
                             (s.cap === 'Index' ? 'text-emerald-600' : 'text-orange-600'));
                
                let priorityClass = s.isPriority ? 'is-priority' : 'bg-white border-r border-slate-200';
                let priorityIcon = s.isPriority ? '★ ' : '';

                let row = `<tr class="text-[12px] group hover:bg-slate-50 transition-colors">
                    <td class="p-4 font-bold sticky-col cursor-pointer transition-colors ${priorityClass}" onclick="togglePriority(${i})" title="Click to highlight as priority investment">
                        ${priorityIcon}${s.name}
                    </td>
                    <td class="p-4 font-black uppercase ${capCol}">${s.cap}</td>
                    <td class="p-4 text-center font-mono font-semibold text-slate-800">₹${s.high.toFixed(2)}</td>`;
                
                for (let j = 1; j <= 8; j++) {
                    let v = (s.high * (1 - (j * 10 / 100))).toFixed(2);
                    let isInv = (s.invested && s.invested.includes(j));
                    let invClass = isInv ? 'is-invested' : 'text-slate-500';
                    row += `<td class="p-4 text-center border-l border-slate-100 cursor-pointer font-mono hover:bg-slate-200 ${invClass}" onclick="toggleInvested(${i}, ${j})">₹${v}</td>`;
                }
                row += `<td class="p-4 text-center"><div class="flex gap-2 justify-center">
                    <button onclick="editStock(${i})" class="text-indigo-400 hover:text-indigo-600">✎</button>
                    <button onclick="removeStock(${i})" class="text-slate-300 hover:text-red-500">✕</button>
                </div></td></tr>`;
                tbody.innerHTML += row;
            });
        }

        function sortData(key) {
            sortDir[key] = !sortDir[key];
            stocks.sort((a, b) => {
                let vA = isNaN(a[key]) ? a[key] : parseFloat(a[key]);
                let vB = isNaN(b[key]) ? b[key] : parseFloat(b[key]);
                return sortDir[key] ? (vA > vB ? 1 : -1) : (vA < vB ? 1 : -1);
            });
            updateUI();
        }

        function resetForm() {
            document.getElementById('stockSearch').value = '';
            document.getElementById('stockHigh').value = '';
            document.getElementById('editIndex').value = '-1';
            document.getElementById('saveBtn').innerText = "Save Changes";
        }

        function removeStock(i) { if(confirm('Remove?')) { stocks.splice(i, 1); updateUI(); } }
        updateUI();
    </script>
</body>
</html>
